# Docker Compose configuration for Relay MCP Server
# For local development and self-hosted deployments

version: '3.8'

services:
  relay-mcp:
    build:
      context: ../..
      dockerfile: packages/server/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Persist database
      - relay-data:/app/data
      # Workspace for file operations
      - relay-workspace:/app/workspace
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DATABASE_PATH=/app/data/relay.db
      - WORK_DIR=/app/workspace
      # Set your encryption secret (use strong random value in production)
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET:-development-secret-change-me}
      # CORS origins (comma-separated)
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Redis for distributed rate limiting (if scaling horizontally)
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

volumes:
  relay-data:
  relay-workspace:
  # redis-data:

# Networks for service isolation
networks:
  default:
    name: relay-mcp-network
